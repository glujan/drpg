name: Build package and publish to PyPI
permissions: {}
on:
  push:
    tags:
      - 20* # Covers tags until year 2100.

jobs:
  build:
    name: Build wheel and sdist packages
    runs-on: ubuntu-latest

    steps:
    - uses: >- # v6.0.2
        actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - uses: >- # v8.0.0
        astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      with:
        python-version: '3.12'
        enable-cache: true
    - name: Build
      run: |
        uv build
    - name: Upload dists
      uses: >- # v7.0.0
        actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: release-dists
        path: dist/

  pypi-publish:
    name: Publish wheel and sdist to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/drpg/
    needs:
      - build
    permissions:
      id-token: write
    steps:
    - name: Retrieve release distributions
      uses: >- # v8.0.1
        actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: release-dists
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  gh-release:
    name: Publish on GitHub
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
    - uses: >- # v6.0.2
        actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Retrieve release distributions
      uses: >- # v8.0.1
        actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: release-dists
        path: dist/
    - uses: >- # v8.0.0
        astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      with:
        python-version: '3.12'
        enable-cache: true
    - name: Install build dependencies
      run: |
        uv sync --group build
    - name: Build Linux binary
      run: |
        uv run pyinstaller pyinstaller-linux.spec
    - name: Create GitHub release
      uses: >- # v2.6.1
        softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
      with:
        generate_release_notes: true
        make_latest: true
        draft: false
        files: |
          dist/drpg-${{github.ref_name}}-py3-none-any.whl
          dist/drpg-${{github.ref_name}}.tar.gz
          dist/drpg-linux-x86_64
