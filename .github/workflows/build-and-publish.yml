name: Build package and publish to PyPI
permissions: {}
on:
  push:
    tags:
      - 20* # Covers tags until year 2100.

jobs:
  build:
    name: Build wheel and sdist packages
    runs-on: ubuntu-latest

    steps:
    - uses: >- # v6.0.2
        actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - uses: >- # v8.0.0
        astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        python-version: '3.12'
        enable-cache: true
    - name: Build
      run: |
        uv build
    - name: Upload dists
      uses: >- # v7.0.0
        actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: release-dists
        path: dist/

  pypi-publish:
    name: Publish wheel and sdist to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/drpg/
    needs:
      - build
    permissions:
      id-token: write
    steps:
    - name: Retrieve release distributions
      uses: >- # v8.0.1
        actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: release-dists
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  gh-release:
    name: Publish on GitHub
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
    - uses: >- # v6.0.2
        actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - name: Retrieve release distributions
      uses: >- # v8.0.1
        actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: release-dists
        path: dist/
    - uses: >- # v8.0.0
        astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        python-version: '3.12'
        enable-cache: true
    - name: Install build dependencies
      run: |
        uv sync --group build
    - name: Build Linux binary
      run: |
        uv run pyinstaller pyinstaller-linux.spec
    - name: Create GitHub release
      uses: >- # v2.6.1
        softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
      with:
        generate_release_notes: true
        make_latest: true
        draft: false
        files: |
          dist/drpg-${{github.ref_name}}-py3-none-any.whl
          dist/drpg-${{github.ref_name}}.tar.gz
          dist/drpg-linux-x86_64

  docker-publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: read
      packages: write
    steps:
    - uses: >- # v6.0.2
        actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Docker Buildx
      uses: >- # v3.10.0
        docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

    - name: Log in to GitHub Container Registry
      uses: >- # v3.4.0
        docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: >- # v5.7.0
        docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=tag

    - name: Build and push Docker image
      uses: >- # v6.16.0
        docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
