name: Build package and publish to PyPI
permissions: {}
on:
  push:
    tags:
      - 20* # Covers tags until year 2100.

jobs:
  build:
    name: Build wheel and sdist packages
    runs-on: ubuntu-latest

    steps:
    - uses: >- # v6.0.2
        actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - uses: >- # v8.0.0
        astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        python-version: '3.12'
        enable-cache: true
    - name: Build
      run: |
        uv build
    - name: Upload dists
      uses: >- # v7.0.0
        actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: release-dists
        path: dist/

  pypi-publish:
    name: Publish wheel and sdist to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/drpg/
    needs:
      - build
    permissions:
      id-token: write
    steps:
    - name: Retrieve release distributions
      uses: >- # v8.0.1
        actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: release-dists
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  gh-release:
    name: Publish on GitHub
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
    - uses: >- # v6.0.2
        actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - name: Retrieve release distributions
      uses: >- # v8.0.1
        actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: release-dists
        path: dist/
    - uses: >- # v8.0.0
        astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        python-version: '3.12'
        enable-cache: true
    - name: Install build dependencies
      run: |
        uv sync --group build
    - name: Build Linux binary
      run: |
        uv run pyinstaller pyinstaller-linux.spec
    - name: Create GitHub release
      uses: >- # v2.6.1
        softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
      with:
        generate_release_notes: true
        make_latest: true
        draft: false
        files: |
          dist/drpg-${{github.ref_name}}-py3-none-any.whl
          dist/drpg-${{github.ref_name}}.tar.gz
          dist/drpg-linux-x86_64
